<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการใช้น้ำ</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Kanit', sans-serif;
    background: #f8fafc;
    margin: 0;
}

.header {
    background: linear-gradient(135deg,#1e3a8a,#3b82f6);
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 16px;
    margin-top: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
    font-family: Kanit;
    width: 100%;
}

/* card */
.card {
    background: white;
    padding: 15px;
    border-radius: 16px;
    margin-top: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f1f5f9;
}

.label { color: #64748b; }
.value { font-weight: 600; }

.month-title {
    margin-top: 20px;
    font-weight: 600;
    color: #1e40af;
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 ประวัติการใช้น้ำทั้งหมด</h2>
</div>

<div class="container">

<div class="box">
    <div>เลือกบ้าน</div>
    <select id="houseSelect" onchange="loadHistory()"></select>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxzsn3zsiIPvcdDA3bepLpynZ-Od78U_oUZlZCgiN5Mg74xVpuWPoh7nP-cLAhFFGlw4A/exec";

let houses = [];

async function loadHouses() {

    const res = await fetch(API + "?type=houses");
    const data = await res.json();

    houses = data;

    const sel = document.getElementById("houseSelect");

    data.forEach(h => {
        sel.innerHTML += `
            <option value="${h.number}">
                บ้าน ${h.number} - ${h.name}
            </option>
        `;
    });

    loadHistory();
}

function loadHistory() {

    const house = document.getElementById("houseSelect").value;

    document.getElementById("result").innerHTML =
    `<div class="card">กำลังโหลด...</div>`;

    fetch(API + `?type=historyAll&house=${house}`)
    .then(res => res.json())
    .then(data => {

        if(!data || data.length === 0) {
            document.getElementById("result").innerHTML =
            `<div class="card">ไม่พบข้อมูล</div>`;
            return;
        }

        // จัดกลุ่มตามเดือน
        const grouped = {};

        data.forEach(d => {
            const key = d.month || "ไม่ระบุเดือน";
            if(!grouped[key]) grouped[key] = [];
            grouped[key].push(d);
        });

        let html = "";

        Object.keys(grouped).forEach(month => {

            html += `<div class="month-title">📅 เดือน ${month}</div>`;

            grouped[month].forEach(d => {

                const usage = Number(d.new) - Number(d.old);

                html += `
                <div class="card">

                    <div class="row">
                        <div class="label">บ้าน</div>
                        <div class="value">${d.house}</div>
                    </div>

                    <div class="row">
                        <div class="label">ชื่อ</div>
                        <div class="value">${d.name}</div>
                    </div>

                    <div class="row">
                        <div class="label">เลขเก่า</div>
                        <div class="value">${d.old}</div>
                    </div>

                    <div class="row">
                        <div class="label">เลขใหม่</div>
                        <div class="value">${d.new}</div>
                    </div>

                    <div class="row">
                        <div class="label">ใช้น้ำ</div>
                        <div class="value">${usage} หน่วย</div>
                    </div>

                    <div class="row">
                        <div class="label">วันที่จดมิเตอร์</div>
                        <div class="value">${d.date || "-"}</div>
                    </div>

                </div>`;
            });
        });

        document.getElementById("result").innerHTML = html;

    })
    .catch(err => {
        document.getElementById("result").innerHTML =
        `<div class="card">โหลดข้อมูลไม่สำเร็จ</div>`;
        console.error(err);
    });
}

loadHouses();

</script>

</body>
</html>
