<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบน้ำประปาชุมชน</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
    --bg:#f3f6fb;
    --card:#ffffff;
    --shadow:0 10px 25px rgba(0,0,0,0.06);
    --shadow-hover:0 18px 35px rgba(0,0,0,0.12);
    --blue1:#0ea5e9;
    --blue2:#1e40af;
}

*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:var(--bg);
    color:#1e293b;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#0f172a,#1e40af,#38bdf8);
    padding:50px 20px 70px;
    border-bottom-left-radius:45px;
    border-bottom-right-radius:45px;
    color:white;
    position:relative;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.icon-btn{
    width:42px;height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.15);
    border-radius:14px;
    backdrop-filter:blur(10px);
}

.title{
    text-align:center;
    margin-top:10px;
}
.title h1{
    margin:0;
    font-size:1.2rem;
    font-weight:600;
}
.title p{
    margin:5px 0;
    opacity:0.8;
    font-size:0.9rem;
}

.user{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    padding:5px 14px;
    border-radius:20px;
    font-size:0.8rem;
}

/* MAIN */
.main{
    margin-top:-35px;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:28px;
    padding:20px;
    height:170px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    text-decoration:none;
    box-shadow:var(--shadow);
    transition:0.3s;
}
.card:hover{
    transform:translateY(-8px);
    box-shadow:var(--shadow-hover);
}

.icon{
    width:50px;
    height:50px;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.blue{background:#dbeafe;color:#2563eb}
.green{background:#dcfce7;color:#16a34a}
.purple{background:#f3e8ff;color:#9333ea}

.card h3{
    margin:0;
    font-size:0.95rem;
    font-weight:500;
    line-height:1.4;
}

.badge{
    opacity:0.5;
}

/* FOOTER */
footer{
    text-align:center;
    font-size:0.75rem;
    padding:25px;
    color:#94a3b8;
}

/* responsive */
@media(max-width:420px){
    .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="header">
    <div class="top">
        <div class="icon-btn"><i data-lucide="menu"></i></div>
        <div class="icon-btn"><i data-lucide="bell"></i></div>
    </div>

    <div class="title">
        <h1>ระบบน้ำประปาชุมชน</h1>
        <p>บ้านหนองหวาย</p>

        <div class="user">
            <i data-lucide="user"></i>
            <span id="user">โอม</span>
        </div>
    </div>
</div>

<div class="main">
    <div class="grid">

        <a class="card" href="input.html">
            <div class="icon blue"><i data-lucide="edit-3"></i></div>
            <h3>บันทึกค่าน้ำ<br>ประจำเดือน</h3>
            <div class="badge"><i data-lucide="droplets"></i></div>
        </a>

        <a class="card" href="history.html">
            <div class="icon green"><i data-lucide="bar-chart-3"></i></div>
            <h3>ประวัติการใช้งาน<br>และสถิติ</h3>
            <div class="badge"><i data-lucide="pie-chart"></i></div>
        </a>

        <a class="card" href="bill.html">
            <div class="icon purple"><i data-lucide="file-text"></i></div>
            <h3>สรุปบิล<br>และใบเสร็จ</h3>
            <div class="badge"><i data-lucide="printer"></i></div>
        </a>

    </div>
</div>

<footer>
© 2026 ระบบบริหารจัดการประปาชุมชน<br>
OHM of WaterSys
</footer>

<script>
lucide.createIcons();
</script>

</body>
</html>
