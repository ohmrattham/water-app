<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กรอกค่าน้ำ | WaterSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-blue: #1e40af;
            --secondary-blue: #2563eb;
            --bg-body: #f8fafc;
            --success-green: #22c55e;
            --warning-orange: #f59e0b;
            --danger-red: #ef4444;
            --purple: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-body);
            color: #1e293b;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 30px 20px 80px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .container {
            padding: 0 15px;
            margin-top: -60px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 40px;
        }

        /* --- DASHBOARD STYLE --- */
        .summary-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .summary-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-label { font-size: 12px; color: #64748b; margin-bottom: 5px; }
        .stat-value { font-size: 22px; font-weight: 600; line-height: 1; margin-bottom: 5px; }
        .stat-unit { font-size: 11px; color: #94a3b8; }

        .stat-all { color: var(--secondary-blue); }
        .stat-done { color: var(--success-green); }
        .stat-pending { color: var(--danger-red); }
        .stat-percent { color: var(--purple); }

        /* --- TABLE CARD --- */
        .main-card {
            background: white;
            border-radius: 30px;
            padding: 25px 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .selectors { display: flex; gap: 8px; }
        select, .year-input {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8fafc; color: #64748b; font-weight: 500; text-align: left; padding: 15px 10px; font-size: 14px; }
        td { padding: 15px 10px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }

        .meter-input {
            width: 80px; padding: 8px; border-radius: 10px;
            border: 1.5px solid #e2e8f0; text-align: center; font-family: 'Kanit', sans-serif;
        }

        .btn {
            padding: 8px 15px; border: none; border-radius: 10px;
            color: white; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-save { background: var(--secondary-blue); }
        .btn-done { background: var(--success-green); cursor: default; }
        .btn-loading { background: var(--warning-orange); cursor: wait; }

        .status-pill { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
        .p-wait { background: #fff7ed; color: #9a3412; }
        .p-done { background: #f0fdf4; color: #166534; }

        @media(max-width: 600px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 20px; }
            .main-card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2><i data-lucide="clipboard-check" style="margin-right:8px"></i> ระบบบันทึกค่าน้ำ</h2>
</div>

<div class="container">
    <!-- สรุปภาพรวม (Dashboard) -->
    <div class="summary-card">
        <div class="summary-title">สรุปภาพรวมเดือนปัจจุบัน</div>
        <div class="summary-grid">
            <div class="stat-box">
                <div class="stat-label">ทั้งหมด</div>
                <div class="stat-value stat-all" id="total_houses">0</div>
                <div class="stat-unit">หลัง</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">กรอกแล้ว</div>
                <div class="stat-value stat-done" id="done_houses">0</div>
                <div class="stat-unit">หลัง</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">รอกรอก</div>
                <div class="stat-value stat-pending" id="pending_houses">0</div>
                <div class="stat-unit">หลัง</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">คิดเป็น</div>
                <div class="stat-value stat-percent" id="percent_done">0%</div>
                <div class="stat-unit">ของทั้งหมด</div>
            </div>
        </div>
    </div>

    <!-- ส่วนตารางข้อมูล -->
    <div class="main-card">
        <div class="top-bar">
            <span style="font-weight:600; color:#475569">รายการบ้านพัก</span>
            <div class="selectors">
                <select id="month">
                    <option value="1">ม.ค.</option><option value="2">ก.พ.</option>
                    <option value="3">มี.ค.</option><option value="4">เม.ย.</option>
                    <option value="5">พ.ค.</option><option value="6">มิ.ย.</option>
                    <option value="7">ก.ค.</option><option value="8">ส.ค.</option>
                    <option value="9">ก.ย.</option><option value="10">ต.ค.</option>
                    <option value="11">พ.ย.</option><option value="12">ธ.ค.</option>
                </select>
                <input type="number" id="year" class="year-input" value="2569" style="width:80px">
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>บ้าน</th>
                        <th>ชื่อเจ้าของ</th>
                        <th>เก่า</th>
                        <th>ใหม่</th>
                        <th>บันทึก</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    if(localStorage.getItem("login") !== "true") window.location = "index.html";

    const API = "https://script.google.com/macros/s/AKfycbxnc69DpHYtL3KNTP6Y2DoStQhZ7xhgDNjBNH8p3Lzac-VRBn937XPmQX43JX5KDu67/exec?type=users";
    let houses = [];
    let countDone = 0;

    async function loadHouses(){
        const tableBody = document.getElementById("table");
        tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px;">กำลังโหลด...</td></tr>`;
        
        try{
            const res = await fetch(API + "?type=houses");
            const data = await res.json();
            houses = data.map((h,i)=>({
                id: i+1, house: h.number, village: h.moo, name: h.name, old: h.lastMeter || 0
            }));
            houses.sort((a,b)=> a.house.localeCompare(b.house, undefined, {numeric:true}));
            
            updateStats();
            render();
        }catch(err){
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">เกิดข้อผิดพลาด</td></tr>`;
        }
    }

    function updateStats() {
        const total = houses.length;
        const pending = total - countDone;
        const percent = total > 0 ? Math.round((countDone / total) * 100) : 0;

        document.getElementById("total_houses").innerText = total;
        document.getElementById("done_houses").innerText = countDone;
        document.getElementById("pending_houses").innerText = pending;
        document.getElementById("percent_done").innerText = percent + "%";
    }

    function render(){
        let html = "";
        houses.forEach((h)=>{
            html += `
                <tr>
                    <td><b>${h.house}</b><br><span class="status-pill p-wait" id="status_${h.id}">ม.${h.village}</span></td>
                    <td>${h.name}</td>
                    <td style="color:#94a3b8">${h.old}</td>
                    <td><input type="number" class="meter-input" id="new_${h.id}" placeholder="..."></td>
                    <td>
                        <button class="btn btn-save" onclick="save(${h.id}, this)">
                            <i data-lucide="save" size="16"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        document.getElementById("table").innerHTML = html;
        lucide.createIcons();
    }

    function save(id, btn){
        let h = houses.find(x=>x.id===id);
        let newMeter = document.getElementById("new_"+id).value;

        if(!newMeter || Number(newMeter) < Number(h.old)){
            alert("ข้อมูลมิเตอร์ไม่ถูกต้อง"); return;
        }

        btn.disabled = true; btn.className = "btn btn-loading";
        btn.innerHTML = "...";

        fetch(API,{
            method:"POST",
            body:JSON.stringify({
                action:"save", house:h.house, village:h.village, name:h.name,
                old:h.old, new:newMeter, month:document.getElementById("month").value,
                year:document.getElementById("year").value, recorder:localStorage.getItem("name")
            })
        })
        .then(res=>res.text())
        .then(res=>{
            if(res === "duplicate"){
                alert("บันทึกไปแล้ว!");
                btn.disabled = false; btn.className = "btn btn-save"; btn.innerHTML = `<i data-lucide="save" size="16"></i>`;
                lucide.createIcons();
                return;
            }
            document.getElementById("status_"+id).innerText = "บันทึกแล้ว";
            document.getElementById("status_"+id).className = "status-pill p-done";
            btn.className = "btn btn-done"; btn.innerHTML = `<i data-lucide="check" size="16"></i>`;
            
            countDone++;
            updateStats();
            localStorage.setItem("count", countDone);
            lucide.createIcons();
        })
        .catch(err=> { alert("บันทึกไม่สำเร็จ"); btn.disabled = false; btn.className = "btn btn-save"; });
    }

    countDone = Number(localStorage.getItem("count") || 0);
    loadHouses();
    lucide.createIcons();
</script>

</body>
</html>
