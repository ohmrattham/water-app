<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กรอกค่าน้ำ | WaterSys</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --primary-blue: #1e40af;
    --secondary-blue: #2563eb;
    --bg-body: #f8fafc;
    --success-green: #22c55e;
    --warning-orange: #f59e0b;
    --danger-red: #ef4444;
    --purple: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Kanit', sans-serif;
    background-color: var(--bg-body);
    color: #1e293b;
    min-height: 100vh;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
    padding: 30px 20px 80px;
    text-align: center;
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
}

/* FLOAT HOME BUTTON */
.floating-home {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    transition: 0.2s;
}

.floating-home:hover {
    transform: scale(1.1);
    background: #f1f5f9;
}

.container {
    padding: 0 15px;
    margin-top: -60px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    padding-bottom: 40px;
}

/* DASHBOARD */
.summary-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.summary-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary-blue);
    margin-bottom: 15px;
}

.summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.stat-box {
    background: white;
    border: 1px solid #f1f5f9;
    border-radius: 16px;
    padding: 15px 10px;
    text-align: center;
}

.stat-value { font-size: 22px; font-weight: 600; }
.stat-all { color: var(--secondary-blue); }
.stat-done { color: var(--success-green); }
.stat-pending { color: var(--danger-red); }
.stat-percent { color: var(--purple); }

/* TABLE */
.main-card {
    background: white;
    border-radius: 30px;
    padding: 25px 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #f1f5f9;
}

.year-input {
    padding: 8px 12px;
    border-radius: 12px;
    border: 1.5px solid #e2e8f0;
    font-family: 'Kanit', sans-serif;
}

.table-wrapper { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 500px;
}

th {
    background: #f8fafc;
    color: #64748b;
    font-weight: 500;
    text-align: left;
    padding: 15px 10px;
}

td {
    padding: 15px 10px;
    border-bottom: 1px solid #f1f5f9;
}

.meter-input {
    width: 80px;
    padding: 8px;
    border-radius: 10px;
    border: 1.5px solid #e2e8f0;
    text-align: center;
}

.btn {
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.btn-save { background: var(--secondary-blue); }
.btn-done { background: var(--success-green); }
.btn-loading { background: var(--warning-orange); cursor: wait; }

.status-pill {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
}

.p-wait { background: #fff7ed; color: #9a3412; }
.p-done { background: #f0fdf4; color: #166534; }

</style>
</head>

<body>

<!-- 🔥 FLOATING HOME ICON -->
<div class="floating-home" onclick="goHome()">
    <i data-lucide="home"></i>
</div>

<div class="header">
    <h2>📊 ระบบบันทึกค่าน้ำ</h2>
</div>

<div class="container">

<!-- DASHBOARD -->
<div class="summary-card">
    <div class="summary-title">สรุปภาพรวม</div>
    <div class="summary-grid">
        <div class="stat-box">
            <div>ทั้งหมด</div>
            <div class="stat-value stat-all" id="total_houses">0</div>
        </div>
        <div class="stat-box">
            <div>กรอกแล้ว</div>
            <div class="stat-value stat-done" id="done_houses">0</div>
        </div>
        <div class="stat-box">
            <div>รอกรอก</div>
            <div class="stat-value stat-pending" id="pending_houses">0</div>
        </div>
        <div class="stat-box">
            <div>เปอร์เซ็นต์</div>
            <div class="stat-value stat-percent" id="percent_done">0%</div>
        </div>
    </div>
</div>

<!-- TABLE -->
<div class="main-card">

<div class="top-bar">
    <span>รายการบ้าน</span>

    <div style="display:flex;gap:10px;align-items:center;">

        <input type="number" id="year" class="year-input" readonly>

        <button onclick="closeMonth()"
            style="background:#2563eb;color:white;border:none;padding:8px 12px;border-radius:10px;">
            📊 สรุปเดือน
        </button>

    </div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>บ้าน</th>
<th>ชื่อ</th>
<th>เก่า</th>
<th>ใหม่</th>
<th>บันทึก</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxzsn3zsiIPvcdDA3bepLpynZ-Od78U_oUZlZCgiN5Mg74xVpuWPoh7nP-cLAhFFGlw4A/exec";

const now = new Date();
const month = now.getMonth() + 1;
const year = now.getFullYear() + 543;

document.getElementById("year").value = year;

let houses = [];
let countDone = 0;

/* 🔥 กลับหน้าหลัก */
function goHome() {
    window.location.href = "index.html";
}

async function loadHouses() {

    document.getElementById("table").innerHTML =
    `<tr><td colspan="5" style="text-align:center;">กำลังโหลด...</td></tr>`;

    const res = await fetch(API + "?type=houses");
    const data = await res.json();

    houses = data.map((h, i) => ({
        id: i + 1,
        house: h.number,
        village: h.moo,
        name: h.name,
        old: h.lastMeter || 0
    }));

    render();
    updateStats();
}

function render() {

    let html = "";

    houses.forEach(h => {

        html += `
        <tr>
            <td><b>${h.house}</b><br>
                <span class="status-pill p-wait">ม.${h.village}</span>
            </td>

            <td>${h.name}</td>

            <td id="old_${h.id}">${h.old}</td>

            <td>
                <input class="meter-input" id="new_${h.id}">
            </td>

            <td>
                <button class="btn btn-save" onclick="save(${h.id}, this)">
                    💾
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;
    lucide.createIcons();
}

function updateStats() {

    document.getElementById("total_houses").innerText = houses.length;
    document.getElementById("done_houses").innerText = countDone;
    document.getElementById("pending_houses").innerText = houses.length - countDone;

    let percent = houses.length
        ? Math.round((countDone / houses.length) * 100)
        : 0;

    document.getElementById("percent_done").innerText = percent + "%";
}

function save(id, btn) {

    const h = houses.find(x => x.id === id);
    const newMeter = document.getElementById("new_" + id).value;

    if (!newMeter || Number(newMeter) < Number(h.old)) {
        alert("ข้อมูลไม่ถูกต้อง");
        return;
    }

    fetch(API, {
        method: "POST",
        body: JSON.stringify({
            house: h.house,
            moo: h.village,
            name: h.name,
            old: h.old,
            new: newMeter,
            month: month,
            year: year
        })
    })
    .then(res => res.text())
    .then(res => {

        h.old = newMeter;
        document.getElementById("old_" + id).innerText = newMeter;

        countDone++;
        updateStats();

        btn.innerText = "✔";
        btn.className = "btn btn-done";
    });

}

function closeMonth() {

    if (!confirm("ยืนยันสรุปเดือนนี้?")) return;

    fetch(API, {
        method: "POST",
        body: JSON.stringify({
            action: "closeMonth",
            month: month,
            year: year
        })
    })
    .then(res => res.text())
    .then(res => {
        alert("สรุปเดือนเรียบร้อย");
        countDone = 0;
        updateStats();
        localStorage.removeItem("count");
    });
}

loadHouses();

</script>

</body>
</html>
