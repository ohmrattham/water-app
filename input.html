<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กรอกค่าน้ำ | WaterSys</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --primary-blue: #1e40af;
    --secondary-blue: #2563eb;
    --bg-body: #f8fafc;
    --success-green: #16a34a;
    --warning-orange: #ea580c;
    --danger-red: #ef4444;
    --purple: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Kanit', sans-serif;
    background-color: var(--bg-body);
    color: #1e293b;
    min-height: 100vh;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
    padding: 30px 20px 80px;
    text-align: center;
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
}

/* FLOAT HOME BUTTON */
.floating-home {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    transition: 0.2s;
}

.floating-home:hover {
    transform: scale(1.1);
    background: #f1f5f9;
}

.container {
    padding: 0 15px;
    margin-top: -60px;
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
    padding-bottom: 40px;
}

/* DASHBOARD */
.summary-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.summary-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary-blue);
    margin-bottom: 15px;
}

.summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.stat-box {
    background: white;
    border: 1px solid #f1f5f9;
    border-radius: 16px;
    padding: 15px 10px;
    text-align: center;
}

.stat-value { font-size: 22px; font-weight: 600; }
.stat-all { color: var(--secondary-blue); }
.stat-done { color: var(--success-green); }
.stat-pending { color: var(--danger-red); }
.stat-percent { color: var(--purple); }

/* TABLE CARD */
.main-card {
    background: white;
    border-radius: 30px;
    padding: 25px 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #f1f5f9;
    flex-wrap: wrap;
    gap: 15px;
}

/* ช่องเลือกเดือน/ปี ด้านบน */
.filter-group {
    display: flex;
    gap: 8px;
    align-items: center;
}

.select-input {
    padding: 8px 12px;
    border-radius: 12px;
    border: 1.5px solid #e2e8f0;
    font-family: 'Kanit', sans-serif;
    font-size: 14px;
    background: white;
    outline: none;
}

/* 🔍 SEARCH INPUT STYLE */
.search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.search-input {
    padding: 10px 16px 10px 40px;
    border-radius: 15px;
    border: 1.5px solid #e2e8f0;
    font-family: 'Kanit', sans-serif;
    width: 240px;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

.search-input:focus {
    border-color: var(--secondary-blue);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.search-icon {
    position: absolute;
    left: 14px;
    color: #94a3b8;
    pointer-events: none;
}

.table-wrapper { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 750px;
}

th {
    background: #f8fafc;
    color: #475569;
    font-weight: 500;
    text-align: center;
    padding: 15px 10px;
    font-size: 14px;
}

th:nth-child(4) { text-align: left; }

td {
    padding: 12px 10px;
    border-bottom: 1px solid #f1f5f9;
    text-align: center;
    font-size: 14px;
}

td:nth-child(4) { text-align: left; }

.meter-input {
    width: 90px;
    padding: 8px;
    border-radius: 10px;
    border: 1.5px solid #e2e8f0;
    text-align: center;
    font-family: 'Kanit', sans-serif;
}

.meter-input:disabled {
    background-color: #f8fafc;
    color: #64748b;
    border-color: #e2e8f0;
}

/* BUTTONS */
.btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    font-weight: 400;
    min-width: 75px;
    transition: 0.2s;
}

.btn-save { background: var(--success-green); }
.btn-save:hover { background: #15803d; }
.btn-edit { background: var(--secondary-blue); }
.btn-edit:hover { background: #1d4ed8; }
.btn-loading { background: var(--warning-orange); cursor: wait; }

/* STATUS PILLS */
.status-pill {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    display: inline-block;
    text-align: center;
    min-width: 100px;
}

.p-wait { background: #fff7ed; color: #c2410c; }
.p-done { background: #f0fdf4; color: #15803d; font-size: 11px; line-height: 1.3; }

/* PAGINATION */
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
    margin-top: 25px;
}

.page-btn {
    width: 36px;
    height: 36px;
    border: 1px solid #e2e8f0;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Kanit', sans-serif;
    font-size: 14px;
    color: #475569;
    transition: 0.2s;
}

.page-btn:hover {
    background: #f1f5f9;
}

.page-btn.active {
    background: var(--secondary-blue);
    color: white;
    border-color: var(--secondary-blue);
}

.page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="floating-home" onclick="goHome()">
    <i data-lucide="home"></i>
</div>

<div class="header">
    <h2>📊 ระบบบันทึกค่าน้ำ</h2>
</div>

<div class="container">

<div class="summary-card">
    <div class="summary-title">สรุปภาพรวมในเดือนที่เลือก</div>
    <div class="summary-grid">
        <div class="stat-box">
            <div>ทั้งหมด</div>
            <div class="stat-value stat-all" id="total_houses">0</div>
        </div>
        <div class="stat-box">
            <div>กรอกแล้ว</div>
            <div class="stat-value stat-done" id="done_houses">0</div>
        </div>
        <div class="stat-box">
            <div>รอกรอก</div>
            <div class="stat-value stat-pending" id="pending_houses">0</div>
        </div>
        <div class="stat-box">
            <div>เปอร์เซ็นต์</div>
            <div class="stat-value stat-percent" id="percent_done">0%</div>
        </div>
    </div>
</div>

<div class="main-card">

<div class="top-bar">
    <div class="filter-group">
        <select id="monthSelect" class="select-input" onchange="loadHouses()">
            <option value="ม.ค.">ม.ค.</option>
            <option value="ก.พ.">ก.พ.</option>
            <option value="มี.ค.">มี.ค.</option>
            <option value="เม.ย.">เม.ย.</option>
            <option value="พ.ค.">พ.ค.</option>
            <option value="มิ.ย.">มิ.ย.</option>
            <option value="ก.ค.">ก.ค.</option>
            <option value="ส.ค.">ส.ค.</option>
            <option value="ก.ย.">ก.ย.</option>
            <option value="ต.ค.">ต.ค.</option>
            <option value="พ.ย.">พ.ย.</option>
            <option value="ธ.ค.">ธ.ค.</option>
        </select>
        <select id="yearSelect" class="select-input" onchange="loadHouses()">
            <option value="2026">2569 (2026)</option>
            <option value="2025">2568 (2025)</option>
        </select>
    </div>

    <div style="display:flex; gap:12px; align-items:center;">
        <div class="search-wrapper">
            <i data-lucide="search" class="search-icon" style="width: 18px; height: 18px;"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาด้วยชื่อหรือบ้านเลขที่..." oninput="handleSearch()">
        </div>
    </div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th style="width: 60px;">ลำดับ</th>
<th>บ้านเลขที่</th>
<th style="width: 70px;">หมู่ที่</th>
<th>ชื่อ - สกุล</th>
<th>เลขมิเตอร์<br>ครั้งก่อน</th>
<th>เลขมิเตอร์<br>ปัจจุบัน</th>
<th>สถานะ</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="pagination" id="pagination"></div>

</div>
</div>

<script>
// ⚠️ เอารหัสลิงก์เว็บแอปตัวล่าสุดของน้ามาใส่แทนที่ลิงก์เก่าตรงนี้ได้เลยครับ!
const API = "https://script.google.com/macros/s/AKfycbwiBlPvvsZwfhcD_6Xc0B3gL7deBI5_HnwQBa8d5kD6JRvnzGQUwHRM6DW76mU2mqBB/exec";

const now = new Date();
const monthTH = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

// ตั้งค่าดรอปดาวน์ให้ชี้ที่ เดือน และ ปี ปัจจุบันอัตโนมัติเมื่อเปิดหน้า
document.getElementById("monthSelect").value = monthTH[now.getMonth()];
document.getElementById("yearSelect").value = String(now.getFullYear());

let houses = [];
let filteredHouses = []; 
let currentPage = 1;
const rowsPerPage = 10; 

function goHome() {
    window.location.href = "index.html";
}

// 🟢 แก้ไขเพื่อสยบบั๊ก CORS: เพิ่มชุดควบคุมสิทธิ์ { method: "GET", redirect: "follow" } เวลา fetch ข้อมูล
async function loadHouses() {
    document.getElementById("table").innerHTML =
    `<tr><td colspan="8" style="text-align:center; padding: 30px;">⏳ กำลังเชื่อมต่อข้อมูลค่าน้ำกับระบบฐานข้อมูล...</td></tr>`;

    const selectedMonth = document.getElementById("monthSelect").value;
    const selectedYear = document.getElementById("yearSelect").value;

    try {
        // ดึงรายชื่อบ้านทั้งหมด (ปลดล็อก CORS ด้วย redirect: follow)
        const resHouses = await fetch(API + "?type=houses", { method: "GET", redirect: "follow" });
        const dataHouses = await resHouses.json();

        // ดึงประวัติเดือนที่เลือกมาซ้อนเช็กความต่อเนื่อง
        const resHistory = await fetch(API + `?type=historyWithNames&year=${selectedYear}&month=${selectedMonth}`, { method: "GET", redirect: "follow" });
        const dataHistory = await resHistory.json();
        const historyRecords = Array.isArray(dataHistory) ? dataHistory : [];

        houses = dataHouses.map((h, i) => {
            const match = historyRecords.find(r => String(r.house).trim() === String(h.number).trim());
            const hasValue = match ? true : false;

            return {
                id: i + 1,
                house: h.number,
                village: h.moo,
                name: h.name,
                old: match ? match.old : (h.lastMeter || 0), // หากเคยบันทึกแล้วให้ยึดค่าเก่าของบิลนั้น ไม่งั้นให้ใช้เลขล่าสุดในชีต DATA
                newVal: match ? match.new : "",              // แสดงตัวเลขเดิมคาไว้ในช่องได้เลยเมื่อน้ากดรีเฟรชหน้าจอ
                isDone: hasValue,
                saveTime: match ? formatDate(match.date) : ""
            };
        });

        filteredHouses = [...houses]; 
        currentPage = 1;
        render();
        updateStats();
    } catch (error) {
        document.getElementById("table").innerHTML =
        `<tr><td colspan="8" style="text-align:center; color:red; padding: 30px;">❌ เกิดข้อผิดพลาดในการดึงข้อมูล (CORS บล็อกหรือยังไม่ได้ยืนยันสิทธิ์สคริปต์)</td></tr>`;
        console.error(error);
    }
}

function handleSearch() {
    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    
    if (query === "") {
        filteredHouses = [...houses]; 
    } else {
        filteredHouses = houses.filter(h => 
            String(h.house).toLowerCase().includes(query) || 
            String(h.name).toLowerCase().includes(query)
        );
    }
    
    currentPage = 1; 
    render();
}

function render() {
    let html = "";
    const startIndex = (currentPage - 1) * rowsPerPage;
    const endIndex = startIndex + rowsPerPage;
    const paginatedHouses = filteredHouses.slice(startIndex, endIndex);

    if (paginatedHouses.length === 0) {
        document.getElementById("table").innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 20px; color:#64748b;">❌ ไม่พบข้อมูลบ้านเลขที่หรือชื่อนี้</td></tr>`;
        document.getElementById("pagination").innerHTML = "";
        return;
    }

    paginatedHouses.forEach(h => {
        let statusHtml = "";
        let actionBtnHtml = "";
        let inputDisabled = "";

        if (h.isDone) {
            statusHtml = `<span class="status-pill p-done">บันทึกแล้ว<br><span style="color:#16a34a; font-size:10px;">${h.saveTime}</span></span>`;
            actionBtnHtml = `<button class="btn btn-edit" onclick="enableEdit(${h.id}, this)">แก้ไข</button>`;
            inputDisabled = "disabled";
        } else {
            statusHtml = `<span class="status-pill p-wait">รอกรอก</span>`;
            actionBtnHtml = `<button class="btn btn-save" onclick="save(${h.id}, this)">บันทึก</button>`;
            inputDisabled = "";
        }

        html += `
        <tr>
            <td>${h.id}</td>
            <td><b>${h.house}</b></td>
            <td>${h.village}</td>
            <td>${h.name}</td>
            <td id="old_${h.id}">${h.old}</td>
            <td>
                <input type="number" class="meter-input" id="new_${h.id}" value="${h.newVal}" ${inputDisabled}>
            </td>
            <td id="status_cell_${h.id}">${statusHtml}</td>
            <td id="action_cell_${h.id}">${actionBtnHtml}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;
    setupPagination();
    lucide.createIcons();
}

function setupPagination() {
    const pageCount = Math.ceil(filteredHouses.length / rowsPerPage);
    const container = document.getElementById("pagination");
    container.innerHTML = "";

    if (pageCount <= 1) return;

    const prevBtn = document.createElement("button");
    prevBtn.className = "page-btn";
    prevBtn.innerHTML = "‹";
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { currentPage--; render(); };
    container.appendChild(prevBtn);

    for (let i = 1; i <= pageCount; i++) {
        const btn = document.createElement("button");
        btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
        btn.innerText = i;
        btn.onclick = () => { currentPage = i; render(); };
        container.appendChild(btn);
    }

    const nextBtn = document.createElement("button");
    nextBtn.className = "page-btn";
    nextBtn.innerHTML = "›";
    nextBtn.disabled = currentPage === pageCount;
    nextBtn.onclick = () => { currentPage++; render(); };
    container.appendChild(nextBtn);
}

function updateStats() {
    const countDone = houses.filter(h => h.isDone).length;

    document.getElementById("total_houses").innerText = houses.length;
    document.getElementById("done_houses").innerText = countDone;
    document.getElementById("pending_houses").innerText = houses.length - countDone;

    let percent = houses.length ? Math.round((countDone / houses.length) * 100) : 0;
    document.getElementById("percent_done").innerText = percent + "%";
}

function enableEdit(id, btn) {
    const input = document.getElementById("new_" + id);
    input.disabled = false;
    input.focus();
    
    const actionCell = document.getElementById("action_cell_" + id);
    actionCell.innerHTML = `<button class="btn btn-save" onclick="save(${id}, this)">บันทึก</button>`;
}

function save(id, btn) {
    const h = houses.find(x => x.id === id);
    const newMeterInput = document.getElementById("new_" + id);
    const newMeter = newMeterInput.value;

    if (!newMeter || Number(newMeter) < Number(h.old)) {
        alert("ข้อมูลไม่ถูกต้อง! เลขมิเตอร์ปัจจุบันต้องมากกว่าหรือเท่ากับเลขครั้งก่อน");
        return;
    }

    btn.innerText = "⏳";
    btn.className = "btn btn-loading";
    btn.disabled = true;

    const selectedMonth = document.getElementById("monthSelect").value;
    const selectedYear = document.getElementById("yearSelect").value;

    const payload = {
        action: h.isDone ? "edit" : "save", 
        year: selectedYear,
        month: selectedMonth,
        house: String(h.house).trim(),
        old: Number(h.old),
        new: Number(newMeter)
    };

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" }, 
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
        if (res.status === "success" || res.status === "updated") {
            h.newVal = newMeter;
            h.isDone = true;
            
            const dateOptions = { day: 'numeric', month: 'short' };
            const formattedDate = now.toLocaleDateString('th-TH', dateOptions);
            const formattedYear = String(Number(selectedYear) + 543).slice(-2);
            h.saveTime = `${formattedDate} ${formattedYear}`;

            newMeterInput.disabled = true;
            updateStats();

            document.getElementById(`status_cell_${id}`).innerHTML = 
                `<span class="status-pill p-done">บันทึกแล้ว<br><span style="color:#16a34a; font-size:10px;">${h.saveTime}</span></span>`;
            document.getElementById(`action_cell_${id}`).innerHTML = 
                `<button class="btn btn-edit" onclick="enableEdit(${id}, this)">แก้ไข</button>`;
        } else if (res.status === "duplicate") {
            alert("บ้านหลังนี้ในเดือนนี้เคยมีการบันทึกค่าน้ำไว้แล้วครับน้า!");
            loadHouses();
        } else {
            alert("ระบบแจ้งข้อผิดพลาด: " + (res.message || "บันทึกไม่สำเร็จ"));
            resetBtn(btn);
        }
    })
    .catch(err => {
        alert("เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหมี่อีกครั้ง");
        resetBtn(btn);
        console.error(err);
    });
}

function resetBtn(btn) {
    btn.innerText = "บันทึก";
    btn.className = "btn btn-save";
    btn.disabled = false;
}

function formatDate(rawDate) {
    if(!rawDate) return "";
    const d = new Date(rawDate);
    if(isNaN(d.getTime())) {
        const today = new Date();
        return `${today.getDate()} ${document.getElementById("monthSelect").value} ${String(Number(document.getElementById("yearSelect").value)+543).slice(-2)}`;
    }
    const thMonth = document.getElementById("monthSelect").value;
    const thYear = String(d.getFullYear() + 543).slice(-2);
    return `${d.getDate()} ${thMonth} ${thYear}`;
}

// โหลดข้อมูลค่าน้ำมาทำงานทันทีกระดานเปิดหน้า
loadHouses();
</script>

</body>
</html>
