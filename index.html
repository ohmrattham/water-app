<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | WaterSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</style>
</head>

<body>

<div class="bg-top"></div>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="card">

    <div class="logo-box">
        <i data-lucide="droplets" size="42"></i>
    </div>

    <div class="brand-name">
        WaterSys
    </div>

    <div class="welcome-text">
        ระบบจัดการน้ำประปาอัจฉริยะ
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">

        <div class="input-group">
            <i data-lucide="user" class="main-icon" size="20"></i>

            <input
                type="text"
                id="userInp"
                placeholder="ชื่อผู้ใช้งาน"
                autocomplete="username"
                required
            >
        </div>

        <div class="input-group">
            <i data-lucide="lock" class="main-icon" size="20"></i>

            <input
                type="password"
                id="passInp"
                placeholder="รหัสผ่าน"
                autocomplete="current-password"
                required
            >

            <i
                data-lucide="eye"
                class="eye-icon"
                id="togglePassword"
                onclick="togglePass()"
            ></i>
        </div>

        <button
            type="submit"
            id="loginBtn"
            class="btn-login"
        >
            <div class="spinner"></div>

            <span class="btn-text">
                เข้าสู่ระบบ
            </span>
        </button>

    </form>

    <div id="msg"></div>

</div>

<script>

if (localStorage.getItem("login") === "true") {
    window.location.replace("main.html");
}

document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
});

function togglePass() {

    const passInp = document.getElementById("passInp");

    if(passInp.type === "password"){

        passInp.type = "text";

    }else{

        passInp.type = "password";

    }
}

const API =
"https://script.google.com/macros/s/AKfycbxnc69DpHYtL3KNTP6Y2DoStQhZ7xhgDNjBNH8p3Lzac-VRBn937XPmQX43JX5KDu67/exec?type=users";

let users = [];

async function fetchUsers() {

    try {

        const response = await fetch(API);
        users = await response.json();

    } catch(err) {

        console.error(err);

    }
}

fetchUsers();

async function handleLogin(event){

    event.preventDefault();

    const btn =
        document.getElementById("loginBtn");

    const btnText =
        btn.querySelector(".btn-text");

    const spinner =
        btn.querySelector(".spinner");

    const msg =
        document.getElementById("msg");

    const username =
        document.getElementById("userInp").value.trim();

    const password =
        document.getElementById("passInp").value.trim();

    btn.disabled = true;

    spinner.style.display = "block";
    btnText.style.display = "none";

    if(users.length === 0){
        await fetchUsers();
    }

    const found = users.find(u =>

        String(
            u.user || u.username || ""
        ).trim().toLowerCase()

        ===

        username.toLowerCase()

        &&

        String(
            u.pass || u.password || ""
        ).trim()

        === password

    );

    setTimeout(() => {

        if(found){

            localStorage.setItem(
                "login",
                "true"
            );

            localStorage.setItem(
                "name",
                found.name || ""
            );

            localStorage.setItem(
                "username",
                found.user ||
                found.username ||
                ""
            );

            msg.style.color = "#22c55e";
            msg.innerText = "เข้าสู่ระบบสำเร็จ";

            window.location.replace(
                "main.html"
            );

        }else{

            btn.disabled = false;

            spinner.style.display =
                "none";

            btnText.style.display =
                "block";

            msg.style.color =
                "#ef4444";

            msg.innerText =
                "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
        }

    },800);
}

</script>

</body>
</html>
