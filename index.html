<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | WaterSys</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-blue: #1e40af; 
            --btn-blue: #2563eb;
            --success-green: #22c55e;
            --error-red: #ef4444;
            --bg-body: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Kanit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-body);
            position: relative;
            overflow: hidden;
        }

        .bg-top {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            z-index: -1;
        }

        .card {
            background: white;
            border-radius: 40px;
            padding: 45px 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .logo-box {
            background: var(--primary-blue);
            width: 75px; height: 75px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
        }

        .brand-name { font-size: 28px; font-weight: 600; color: var(--primary-blue); margin-bottom: 5px; }
        .welcome-text { font-size: 14px; color: #64748b; margin-bottom: 40px; }

        .input-group {
            position: relative; 
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .input-group .main-icon {
            position: absolute;
            left: 20px;
            color: #1e293b;
            z-index: 10;
            pointer-events: none;
        }

        /* ปุ่มดูรหัสผ่าน */
        .eye-icon {
            position: absolute;
            right: 20px;
            color: #94a3b8;
            z-index: 10;
            cursor: pointer;
            transition: 0.2s;
        }

        .eye-icon:hover { color: var(--btn-blue); }

        .input-group input {
            width: 100%;
            padding: 16px 50px 16px 55px; /* เผื่อที่ด้านขวา 50px สำหรับไอคอนดวงตา */
            border-radius: 20px;
            border: 1.5px solid #e2e8f0;
            outline: none;
            transition: 0.3s;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
        }

        .input-group input:focus { border-color: var(--btn-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .btn-login {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 20px;
            background: var(--btn-blue);
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Kanit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-login.loading { background: #60a5fa; cursor: wait; }
        .btn-login.success { background: var(--success-green); }
        .btn-login.error { background: var(--error-red); }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .check-icon, .error-icon { display: none; }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.success .check-icon { display: block; }
        .btn-login.error .error-icon { display: block; }

        #msg { margin-top: 15px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="bg-top"></div>

    <div class="card">
        <div class="logo-box"><i data-lucide="droplet" fill="white" size="32"></i></div>
        <div class="brand-name">WaterSys</div>
        <div class="welcome-text">ระบบจัดการน้ำประปาอัจฉริยะ</div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <i data-lucide="user" class="main-icon" size="22"></i>
                <input type="text" id="userInp" placeholder="ชื่อผู้ใช้งาน" required autocomplete="username">
            </div>

            <div class="input-group">
                <i data-lucide="lock" class="main-icon" size="22"></i>
                <input type="password" id="passInp" placeholder="รหัสผ่าน" required autocomplete="current-password">
                <!-- ไอคอนลูกตาสำหรับกดดูรหัส -->
                <i data-lucide="eye" class="eye-icon" id="togglePassword" onclick="togglePass()"></i>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <div class="spinner"></div>
                <i data-lucide="check-circle" class="check-icon" size="22"></i>
                <i data-lucide="alert-circle" class="error-icon" size="22"></i>
                <span class="btn-text">เข้าสู่ระบบ</span>
            </button>
        </form>

        <div id="msg"></div>
    </div>

    <script>
        lucide.createIcons();

        // --- ฟังก์ชัน สลับการมองเห็นรหัสผ่าน ---
        function togglePass() {
            const passInp = document.getElementById('passInp');
            const eyeIcon = document.getElementById('togglePassword');
            
            if (passInp.type === 'password') {
                passInp.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off'); // เปลี่ยนเป็นไอคอนลูกตาขีดฆ่า
            } else {
                passInp.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye'); // เปลี่ยนกลับเป็นไอคอนลูกตาปกติ
            }
            lucide.createIcons(); // สั่งให้ Lucide อัปเดตไอคอนใหม่
        }

        const API = "https://script.google.com/macros/s/AKfycbxnc69DpHYtL3KNTP6Y2DoStQhZ7xhgDNjBNH8p3Lzac-VRBn937XPmQX43JX5KDu67/exec?type=users";
        let users = [];

        async function fetchUsers() {
            try {
                const response = await fetch(API);
                users = await response.json();
                console.log("Users loaded");
            } catch (err) {
                console.error("API Error", err);
            }
        }
        fetchUsers();

        async function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            const msg = document.getElementById('msg');
            const u = document.getElementById('userInp').value.trim();
            const p = document.getElementById('passInp').value.trim();

            btn.classList.add('loading');
            btn.disabled = true;
            msg.innerText = "";

            if (users.length === 0) await fetchUsers();

            const found = users.find(x =>
                (x.user || x.username)?.toString().toLowerCase().trim() === u.toLowerCase() &&
                String(x.pass || x.password).trim() === p
            );

            setTimeout(() => {
                btn.classList.remove('loading');
                if (found) {
                    btn.classList.add('success');
                    btnText.innerText = "สำเร็จแล้ว";
                    msg.innerText = `ยินดีต้อนรับคุณ ${found.name}`;
                    msg.style.color = "var(--success-green)";
                    localStorage.setItem("login", "true");
                    localStorage.setItem("name", found.name);
                    localStorage.setItem("user", (found.user || found.username));
                    setTimeout(() => { window.location.href = "main.html"; }, 1200);
                } else {
                    btn.classList.add('error');
                    btnText.innerText = "ข้อมูลไม่ถูกต้อง";
                    msg.innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
                    msg.style.color = "var(--error-red)";
                    setTimeout(() => {
                        btn.classList.remove('error');
                        btn.disabled = false;
                        btnText.innerText = "เข้าสู่ระบบ";
                    }, 2000);
                }
            }, 1000);
        }
    </script>
</body>
</html>
